# =============================================================================
# OpenClaw – Docker Compose
#
# Architektur:
#   tailscale  ──► teilt seinen Netzwerk-Namespace mit openclaw
#   openclaw   ──► Gateway läuft nur im Tailscale-Netz (kein Host-Port!)
#
# Zugriff:  https://<dein-hostname>.<tailnet>.ts.net
# Telegram: Bot verbindet sich ausgehend zu api.telegram.org (kein Inbound)
# =============================================================================

services:

  # ── Tailscale Sidecar ──────────────────────────────────────────────────────
  # Stellt ein sicheres Tailnet-Interface bereit.
  # openclaw nutzt diesen Netzwerk-Namespace (network_mode: service:tailscale).
  tailscale:
    image: tailscale/tailscale:latest
    container_name: openclaw-tailscale
    hostname: openclaw-nuc            # Hostname im Tailnet (anpassen!)
    restart: unless-stopped

    # Tailscale braucht diese Capabilities für das TUN-Interface
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun

    volumes:
      # Persistenter State: Auth-Token überlebt Container-Neustart
      - tailscale-state:/var/lib/tailscale
      # Tailscale braucht Zugriff auf den Unix-Socket des Hosts für manche Features
      - /dev/net/tun:/dev/net/tun

    environment:
      # Auth-Key aus .env (einmalig beim ersten Start nötig)
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      # Tailscale Serve: Gateway nur im Tailnet verfügbar
      - TS_SERVE_CONFIG=/etc/tailscale/serve-config.json
      # Hostname im Tailnet
      - TS_HOSTNAME=openclaw-nuc
      # Kein Exit-Node, kein Funnel (nur Tailnet-intern)
      - TS_EXTRA_ARGS=--ssh=false --accept-routes=false

    configs:
      - source: tailscale-serve
        target: /etc/tailscale/serve-config.json

    # Nur eingehende Verbindungen über Tailscale erlaubt
    # Kein Host-Port-Mapping!
    networks:
      - internal

  # ── OpenClaw ──────────────────────────────────────────────────────────────
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-app
    restart: unless-stopped
    depends_on:
      tailscale:
        condition: service_started

    # Teilt den Netzwerk-Namespace mit Tailscale →
    # OpenClaw ist NUR über Tailscale erreichbar, kein direkter Host-Zugriff
    network_mode: "service:tailscale"

    # Config und Workspace persistent
    volumes:
      - openclaw-data:/home/openclaw/.openclaw
      - ./config/openclaw.json:/home/openclaw/.openclaw/openclaw.json:ro

    environment:
      # Claude API Key
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Telegram Bot Token
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # Nur diese Telegram-User-IDs können mit dem Bot reden
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      # Node-Produktionsumgebung
      - NODE_ENV=production
      # Kein Telemetry
      - OPENCLAW_TELEMETRY=false

    # Secrets NICHT als env-vars in docker inspect sichtbar – alternativ:
    # secrets:
    #   - anthropic_key
    #   - telegram_token

    # Security: maximale Einschränkungen
    security_opt:
      - no-new-privileges:true
    read_only: false      # OpenClaw schreibt in ~/.openclaw (Workspace)
    cap_drop:
      - ALL

    # Ressourcen-Limits (Intel NUC7i5: ~8 GB RAM, i5)
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 256M

    # Healthcheck wird vom Dockerfile geerbt

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  tailscale-state:
    driver: local
  openclaw-data:
    driver: local

# ── Netzwerk ─────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
    internal: true          # Kein Internet-Zugriff vom Bridge-Netz aus
                            # (Tailscale hat eigenen Internet-Zugriff via Host)

# ── Configs (Tailscale Serve) ─────────────────────────────────────────────────
configs:
  tailscale-serve:
    file: ./config/tailscale-serve.json

# ── Docker Secrets (optional, empfohlen für Produktion) ──────────────────────
# secrets:
#   anthropic_key:
#     file: ./secrets/anthropic_key.txt
#   telegram_token:
#     file: ./secrets/telegram_token.txt
